<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Snippet Editor</title>
  
  <!-- React, ReactDOM, and Babel from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Draft.js and Immutable from CDN -->
  <script crossorigin src="https://unpkg.com/immutable@4.3.0/dist/immutable.min.js"></script>
  <script crossorigin src="https://unpkg.com/draft-js@0.11.7/dist/Draft.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/draft-js@0.11.7/dist/Draft.css">
  
  <style>
    body {
      margin: 0;
      background: #f5f6fa;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      font-family: Arial, sans-serif;
    }

    .editor {
      width: 100%;
      min-height: 100px;
      font-size: 1.1em;
      margin-bottom: 20px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #bbb;
      background: #fff;
      outline: none;
      white-space: pre-wrap;
      word-break: break-word;
      transition: border 0.2s;
    }

    .editor:focus-within {
      border: 1.5px solid #6c63ff;
      background: #f7f7ff;
    }

    .preview {
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 16px;
      min-height: 60px;
      font-size: 1.1em;
      white-space: pre-wrap;
    }

    .highlight {
      background: #ffe066;
      font-weight: bold;
      padding: 0 2px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { Editor, EditorState, CompositeDecorator, Modifier, getDefaultKeyBinding, KeyBindingUtil, ContentState, ContentBlock, BlockMap, genKey, CharacterMetadata, SelectionState } = Draft;
    const { List } = Immutable;

    const { hasCommandModifier } = KeyBindingUtil;

    // Strategy to find words before '::' on each line
    function beforeDoubleColonStrategy(contentBlock, callback, contentState) {
      const text = contentBlock.getText();
      const regex = /(^|\n)(.*?)(?=::)/g;
      let matchArr, start;
      while ((matchArr = regex.exec(text)) !== null) {
        const after = text.slice(matchArr.index + matchArr[0].length, matchArr.index + matchArr[0].length + 2);
        if (after === '::') {
          start = matchArr.index + (matchArr[1] ? matchArr[1].length : 0);
          const end = start + matchArr[2].length;
          if (matchArr[2].length > 0) {
            callback(start, end);
          }
        }
      }
    }

    // Component to render highlighted text
    const Highlight = (props) => (
      <span className="highlight">{props.children}</span>
    );

    const decorator = new CompositeDecorator([
      {
        strategy: beforeDoubleColonStrategy,
        component: Highlight,
      },
    ]);

    function App() {
      const [editorState1, setEditorState1] = useState(() => EditorState.createEmpty(decorator));
      const [editorState2, setEditorState2] = useState(() => EditorState.createEmpty());
      const editorRef1 = useRef();
      const editorRef2 = useRef();

      const text = editorState1.getCurrentContent().getPlainText();
      const snippetLines = editorState2.getCurrentContent().getPlainText().split('\n');

      function handleChange1(newState) {
        setEditorState1(newState);
      }

      function handleChange2(newState) {
        setEditorState2(newState);
      }

      function insertSnippet(snippet) {
        if (!snippet) return;

        const selection = editorState1.getSelection();
        let contentState = editorState1.getCurrentContent();

        if (selection.isCollapsed()) {
          const blockKey = selection.getStartKey();
          const block = contentState.getBlockForKey(blockKey);
          const blockText = block.getText();
          const doubleColonIdx = blockText.indexOf('::');
          let newLine;

          if (doubleColonIdx !== -1) {
            newLine = snippet + '::' + blockText.slice(doubleColonIdx + 2);
          } else {
            newLine = snippet + '::' + (blockText.length > 0 ? ' ' + blockText : '');
          }

          const blockSelection = selection.merge({
            anchorOffset: 0,
            focusOffset: blockText.length,
          });

          contentState = Modifier.replaceText(contentState, blockSelection, newLine);
          
          const cursorOffset = (doubleColonIdx !== -1)
            ? snippet.length + 2
            : (blockText.length > 0 ? snippet.length + 3 : snippet.length + 2);

          const newSelection = selection.merge({
            anchorOffset: cursorOffset,
            focusOffset: cursorOffset,
          });

          let newEditorState = EditorState.push(editorState1, contentState, 'insert-characters');
          newEditorState = EditorState.forceSelection(newEditorState, newSelection);
          setEditorState1(newEditorState);

        } else {
          const startKey = selection.getStartKey();
          const endKey = selection.getEndKey();
          const blockMap = contentState.getBlockMap();
          
          const blocksToModify = [];
          let currentKey = startKey;
          while (true) {
            const block = blockMap.get(currentKey);
            if (block) {
              blocksToModify.push(block);
            }
            if (currentKey === endKey) {
              break;
            }
            currentKey = blockMap.keyOf(blockMap.get(currentKey));
            const nextBlock = contentState.getBlockAfter(currentKey);
            if (!nextBlock) break;
            currentKey = nextBlock.getKey();
          }

          const newContentState = blocksToModify.reduce((currentContent, originalBlock) => {
            const blockKey = originalBlock.getKey();
            const block = currentContent.getBlockForKey(blockKey);

            if (block && block.getText().length > 0) {
              const blockText = block.getText();
              const doubleColonIdx = blockText.indexOf('::');
              let newLine;

              if (doubleColonIdx !== -1) {
                newLine = snippet + '::' + blockText.slice(doubleColonIdx + 2);
              } else {
                newLine = snippet + '::' + ' ' + blockText;
              }

              const blockSelection = SelectionState.createEmpty(blockKey).merge({
                focusOffset: block.getLength(),
              });

              return Modifier.replaceText(currentContent, blockSelection, newLine);
            }
            return currentContent;
          }, contentState);

          let newEditorState = EditorState.push(editorState1, newContentState, 'insert-characters');
          newEditorState = EditorState.forceSelection(newEditorState, selection);
          setEditorState1(newEditorState);
        }
      }

      function keyBindingFn(e) {
        if (e.altKey) {
          if (e.key >= '1' && e.key <= '9') {
            return 'insert-snippet-' + (parseInt(e.key, 10) - 1);
          } else if (e.key === '0') {
            return 'insert-snippet-9';
          }
        }
        if (hasCommandModifier(e) && e.key.toLowerCase() === 'f') {
          return 'select-all-custom';
        }
        if (hasCommandModifier(e) && e.key.toLowerCase() === 'x') {
          const selection = editorState1.getSelection();
          if (selection.isCollapsed()) {
            return 'delete-line';
          }
        }
        return getDefaultKeyBinding(e);
      }

      function handleKeyCommand(command, editorState) {
        if (command && command.startsWith('insert-snippet-')) {
          const idx = parseInt(command.replace('insert-snippet-', ''), 10);
          if (!isNaN(idx) && idx >= 0 && idx < snippetLines.length) {
            insertSnippet(snippetLines[idx]);
            return 'handled';
          }
        }
        if (command === 'select-all-custom') {
          const content = editorState1.getCurrentContent();
          const firstBlock = content.getFirstBlock();
          const lastBlock = content.getLastBlock();
          const selection = editorState1.getSelection().merge({
            anchorKey: firstBlock.getKey(),
            anchorOffset: 0,
            focusKey: lastBlock.getKey(),
            focusOffset: lastBlock.getLength(),
            isBackward: false,
          });
          setEditorState1(EditorState.forceSelection(editorState1, selection));
          return 'handled';
        }
        if (command === 'delete-line') {
          const selection = editorState1.getSelection();
          const contentState = editorState1.getCurrentContent();
          const blockKey = selection.getStartKey();

          let nextBlock = contentState.getBlockAfter(blockKey);
          if (!nextBlock) {
            nextBlock = contentState.getBlockBefore(blockKey);
          }

          const blockMap = contentState.getBlockMap().delete(blockKey);
          let newContentState = contentState.set('blockMap', blockMap);

          if (newContentState.getBlockMap().size === 0) {
            const newBlock = new ContentBlock({
              key: genKey(),
              type: 'unstyled',
              text: '',
              characterList: List(),
            });
            const newBlockMap = BlockMap.createFromArray([newBlock]);
            newContentState = ContentState.createFromBlockArray(newBlockMap.toArray());
            nextBlock = newContentState.getFirstBlock();
          } else if (!nextBlock) {
            nextBlock = newContentState.getFirstBlock();
          }
          
          const newEditorState = EditorState.push(editorState1, newContentState, 'remove-range');

          const newSelection = newEditorState.getSelection().merge({
            anchorKey: nextBlock.getKey(),
            anchorOffset: 0,
            focusKey: nextBlock.getKey(),
            focusOffset: 0,
          });

          setEditorState1(EditorState.forceSelection(newEditorState, newSelection));
          return 'handled';
        }
        return 'not-handled';
      }

      return (
        <div className="container">
          <h2>Highlight words before '::'</h2>
          <div className="editor" ref={editorRef1}>
            <Editor
              editorState={editorState1}
              onChange={handleChange1}
              placeholder="Type here..."
              spellCheck={false}
              keyBindingFn={keyBindingFn}
              handleKeyCommand={handleKeyCommand}
            />
          </div>
          <div className="editor" ref={editorRef2}>
            <Editor
              editorState={editorState2}
              onChange={handleChange2}
              placeholder="Type your snippets here, one per line..."
              spellCheck={false}
            />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
